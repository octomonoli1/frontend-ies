<h2>Listado de alumnos</h2>

<table class="tabla">
  <thead>
    <tr>
      <th>ID</th>
      <th>Nombre</th>
      <th>Apellidos</th>
      <th>Especialidad</th>
    </tr>
  </thead>

  <tbody>
    <tr *ngFor="let profesor of profesores">
      <td>{{ profesor.id }}</td>
      <td>{{ profesor.nombre }}</td>
      <td>{{ profesor.apellidos }}</td>
      <td>{{ profesor.especialidad }}</td>
    </tr>
  </tbody>
</table>
